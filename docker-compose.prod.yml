services:
  # --------------------------------------------------------------------
  # Base de données PostgreSQL
  # --------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: festivalajouer_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - festival_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secureapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------
  # Backend Node.js (API Express + JWT + HTTPS)
  # --------------------------------------------------------------------
  backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      container_name: festivalajouer_backend_prod
      restart: unless-stopped
      depends_on:
        db:
          condition: service_healthy
      environment:
        NODE_ENV: production
      env_file:
        - ./backend/.env
      user: "1000:1000"
      ports:
        - "4000:4000"
      networks:
        - festival_net

  # --------------------------------------------------------------------
  # Frontend Angular (servi via Nginx)
  # --------------------------------------------------------------------
  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      container_name: festivalajouer_frontend_prod
      restart: unless-stopped
      depends_on:
        - backend
      ports:
        - "8080:80"
      networks:
        - festival_net

  # =========================================================
  # Adminer (interface web de gestion PostgreSQL)
  # =========================================================
  adminer:
    image: adminer:latest
    container_name: festivalajouer_adminer_prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
      - FRONTEND_URL=http://localhost:8080
    networks:
      - festival_net

# ----------------------------------------------------------------------
# Volume persistant pour PostgreSQL
# ----------------------------------------------------------------------
volumes:
  db_data:

# ----------------------------------------------------------------------
# Réseau interne privé
# ----------------------------------------------------------------------
networks:
  festival_net: 